<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Edit — Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:radial-gradient(circle at top,#1f2937,#020617);color:white;display:flex;justify-content:center;align-items:center;height:100vh}
.container{background:rgba(255,255,255,0.05);padding:32px;width:370px;border-radius:15px;backdrop-filter:blur(15px);box-shadow:0 0 40px rgba(0,0,0,0.5)}
.logo{text-align:center;font-size:26px;font-weight:bold;margin-bottom:6px}
.subtitle{text-align:center;font-size:13px;color:#6b7280;margin-bottom:24px}
input{width:100%;padding:12px;margin-top:10px;border:1px solid #1f2937;border-radius:8px;background:#111827;color:white;font-size:14px;outline:none;transition:border-color .2s}
input:focus{border-color:#10b981}
button[type=submit]{width:100%;padding:12px;margin-top:16px;border:none;border-radius:8px;background:#10b981;color:white;font-weight:bold;cursor:pointer;font-size:15px;transition:background .2s}
button[type=submit]:hover{background:#059669}
.msg{display:none;margin-top:14px;padding:10px 14px;border-radius:8px;font-size:13px;text-align:center}
.msg.error{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.4);color:#f87171}
.msg.success{background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.4);color:#34d399}
.register-link{text-align:center;margin-top:18px;font-size:13px;color:#6b7280}
.register-link a{color:#10b981;text-decoration:none}
.register-link a:hover{text-decoration:underline}
</style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9342440344903007" crossorigin="anonymous"></script>
</head>
<body>
<div class="container">
    <div class="logo">🤖 AI Edit</div>
    <div class="subtitle">Sign in to your account</div>
    <form method="POST" action="/login">
        <input type="email" name="email" placeholder="Email address" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Sign In</button>
    </form>
    <div class="msg error" id="errMsg">❌ Wrong email or password.</div>
    <div class="msg success" id="okMsg">✅ Account created! You can now sign in.</div>
    <div class="register-link">Don't have an account? <a href="/register">Register</a></div>
</div>
<script>
const p=new URLSearchParams(window.location.search);
if(p.get("error")==="1")document.getElementById("errMsg").style.display="block";
if(p.get("registered")==="1")document.getElementById("okMsg").style.display="block";
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Edit — Register</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:radial-gradient(circle at top,#0f172a,#020617);color:white;display:flex;justify-content:center;align-items:center;min-height:100vh}
.container{background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);padding:35px;width:380px;border-radius:18px;box-shadow:0 0 40px rgba(0,0,0,0.6);animation:fadeIn .6s ease}
.logo{text-align:center;font-size:28px;font-weight:600;margin-bottom:6px}
.subtitle{text-align:center;font-size:13px;color:#94a3b8;margin-bottom:25px}
input{width:100%;padding:12px;margin-top:12px;border-radius:10px;border:1px solid #1e293b;background:#020617;color:white;font-size:14px;transition:.2s;outline:none}
input:focus{border-color:#6366f1}
button{width:100%;padding:12px;margin-top:18px;border:none;border-radius:10px;background:linear-gradient(135deg,#6366f1,#a855f7);color:white;font-size:15px;font-weight:500;cursor:pointer;transition:.2s}
button:hover{opacity:.9}
.login-link{text-align:center;margin-top:18px;font-size:13px;color:#94a3b8}
.login-link a{color:#6366f1;text-decoration:none}
.login-link a:hover{text-decoration:underline}
.popup{position:fixed;top:20px;right:20px;background:#10b981;padding:14px 18px;border-radius:10px;color:white;font-size:14px;box-shadow:0 10px 25px rgba(0,0,0,0.4);opacity:0;transform:translateY(-20px);transition:all .4s ease}
.popup.show{opacity:1;transform:translateY(0)}
.err{display:none;margin-top:14px;padding:10px 14px;border-radius:8px;font-size:13px;text-align:center;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.4);color:#f87171}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="container">
    <div class="logo">🚀 AI Edit</div>
    <div class="subtitle">Create your account</div>
    <form method="POST" action="/register">
        <input type="email" name="email" placeholder="Email address" required>
        <input type="password" name="password" placeholder="Password (min 6 chars)" required>
        <input type="password" name="confirm" placeholder="Confirm Password" required>
        <button type="submit">Create Account</button>
    </form>
    <div class="err" id="errMsg"></div>
    <div class="login-link">Already have an account? <a href="/login">Login</a></div>
</div>
<div class="popup" id="popup">✅ Account created successfully!</div>
<script>
const p=new URLSearchParams(window.location.search);
const err=p.get("error");
const el=document.getElementById("errMsg");
if(err==="mismatch"){el.textContent="❌ Passwords do not match.";el.style.display="block"}
else if(err==="short"){el.textContent="❌ Password must be at least 6 characters.";el.style.display="block"}
else if(err==="exists"){el.textContent="❌ Email already registered.";el.style.display="block"}
else if(err==="empty"){el.textContent="❌ Email and password are required.";el.style.display="block"}
if(p.get("registered")==="1"){
    const popup=document.getElementById("popup");
    popup.classList.add("show");
    setTimeout(()=>{popup.classList.remove("show");window.location.href="/login"},2500);
}
</script>
</body>
</html>
